<title>ばんえい予測レビュー</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#c1462a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ばんえい予測">
<style>
:root{
  --bg:#f5efe4; --surface:#fffdf9; --surface2:#faf5ec; --ink:#231d13; --muted:#6f6353;
  --border:#e7ddca; --border2:#efe7d7; --accent:#c1462a; --accent-soft:#f3ddd3;
  --good:#2f7d55; --good-soft:#dcefe1; --edge:#137a7a; --edge-soft:#d5ecec;
  --track:#e6dcc7; --dry:#c08a3e; --wet:#2f7fae; --ev-hue:#c8891f;
  --shadow:0 1px 2px rgba(60,40,10,.06),0 8px 22px -12px rgba(60,40,10,.16);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#15110b; --surface:#1f1911; --surface2:#251e14; --ink:#efe7d8; --muted:#a2917a;
  --border:#332a1d; --border2:#2a2216; --accent:#e0663f; --accent-soft:#3a221a;
  --good:#57b07f; --good-soft:#1b2f22; --edge:#3fb0b0; --edge-soft:#123030;
  --track:#3a3020; --dry:#d19a4e; --wet:#4d9fce; --ev-hue:#e6b450;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.65);
}}
:root[data-theme="light"]{--bg:#f5efe4;--surface:#fffdf9;--surface2:#faf5ec;--ink:#231d13;--muted:#6f6353;--border:#e7ddca;--border2:#efe7d7;--accent:#c1462a;--accent-soft:#f3ddd3;--good:#2f7d55;--good-soft:#dcefe1;--edge:#137a7a;--edge-soft:#d5ecec;--track:#e6dcc7;--dry:#c08a3e;--wet:#2f7fae;--ev-hue:#c8891f;--shadow:0 1px 2px rgba(60,40,10,.06),0 8px 22px -12px rgba(60,40,10,.16);}
:root[data-theme="dark"]{--bg:#15110b;--surface:#1f1911;--surface2:#251e14;--ink:#efe7d8;--muted:#a2917a;--border:#332a1d;--border2:#2a2216;--accent:#e0663f;--accent-soft:#3a221a;--good:#57b07f;--good-soft:#1b2f22;--edge:#3fb0b0;--edge-soft:#123030;--track:#3a3020;--dry:#d19a4e;--wet:#4d9fce;--ev-hue:#e6b450;--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.65);}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  line-height:1.45;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.wrap{max-width:560px;margin:0 auto;padding:0 12px calc(40px + env(safe-area-inset-bottom))}

header{padding:14px 14px 8px;max-width:560px;margin:0 auto}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.12rem;letter-spacing:.01em}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 0 4px var(--accent-soft)}
.brand small{margin-left:auto;font-size:.7rem;color:var(--muted);font-weight:500}

/* sticky selectors */
.nav{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);
  backdrop-filter:blur(8px);padding:8px 0 6px;margin-bottom:6px}
.nav-in{max-width:560px;margin:0 auto;padding:0 12px}
.dates{display:flex;gap:6px;margin-bottom:7px}
.dpill{flex:1;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 4px;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--ink)}
.dpill[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent)}
.races{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.races::-webkit-scrollbar{display:none}
.rpill{flex:none;min-width:38px;text-align:center;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:7px 0;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--ink);position:relative}
.rpill[aria-pressed="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.rpill .hitdot{position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--good)}
.rpill[aria-pressed="true"] .hitdot{background:var(--good-soft)}

/* race meta */
.meta{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}
.meta .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.meta .rname{font-weight:800;font-size:1rem;flex:1;min-width:0}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:.7rem;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.chip b{color:var(--ink)}
.chip.moist{background:var(--edge-soft);color:var(--edge);border-color:transparent;font-weight:700}
.chip.pre{background:var(--accent-soft);color:var(--accent);border-color:transparent;font-weight:700}
.chip.upd{background:var(--edge-soft);color:var(--edge);border-color:transparent;font-weight:700}
.assess{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:.84rem;flex-wrap:wrap}
.assess .al{font-weight:800;padding:3px 12px;border-radius:999px;font-size:.82rem;white-space:nowrap}
.assess .an{color:var(--muted)}
.assess .an2{color:var(--edge);font-weight:600}
.assess.ax .al{background:var(--good-soft);color:var(--good)}
.assess.two .al{background:var(--edge-soft);color:var(--edge)}
.assess.mix .al{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.assess.chaos .al{background:var(--accent-soft);color:var(--accent)}
.betwrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);background:var(--surface)}
table.bt-tbl{border-collapse:collapse;width:100%;min-width:420px;font-size:.85rem}
table.bt-tbl th{font-size:.66rem;color:var(--muted);font-weight:700;padding:7px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
table.bt-tbl th.l,table.bt-tbl td.l{text-align:left}
table.bt-tbl td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--border2);font-variant-numeric:tabular-nums;white-space:nowrap}
table.bt-tbl tr:last-child td{border-bottom:none}
.bt-tbl .bt{font-size:.72rem;padding:2px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);font-weight:700}
.bt-tbl .combo{font-weight:800;letter-spacing:.02em}
.bt-tbl .evp{color:var(--accent);font-weight:800}
.cart-row{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.cart-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:.92rem;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.cart-btn:hover{filter:brightness(1.06)}
.cart-btn:focus-visible{outline:2px solid var(--edge);outline-offset:2px}
.cart-total{font-weight:800;font-variant-numeric:tabular-nums;font-size:1rem}
.betset{margin-bottom:10px}
.setbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer}
.setfields{display:none;grid-template-columns:1fr;gap:8px;margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
.setfields label{display:flex;flex-direction:column;gap:3px;font-size:.72rem;color:var(--muted);font-weight:700}
.setfields input{font-family:inherit;font-size:.86rem;padding:7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--ink)}
.savebtn{background:var(--edge);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:700;font-family:inherit;cursor:pointer;justify-self:start}
.livehead{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.livehead .cd{font-size:.92rem;font-weight:700}
.livehead .cd b{color:var(--accent);font-variant-numeric:tabular-nums;font-size:1.1rem}
.livehead .livetm{font-size:.72rem;color:var(--edge);font-weight:700}
.result{display:flex;gap:8px;margin-top:11px}
.rescell{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:8px 4px;text-align:center}
.rescell .t{font-size:.64rem;color:var(--muted);letter-spacing:.02em}
.rescell .v{font-size:1.05rem;font-weight:800;margin-top:2px}
.rescell.win .v{color:var(--good)}
.hitmark{font-size:.66rem;margin-top:2px}
.hitmark.o{color:var(--good)} .hitmark.x{color:var(--muted)}

.sect{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:20px 4px 9px}
.secthead{display:flex;align-items:center;gap:8px;margin:20px 4px 9px;flex-wrap:wrap}
.secthead .sect{margin:0;flex:1 0 100%}
@media(min-width:460px){.secthead .sect{flex:1}}
.vtoggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:none}
.vtoggle button{background:var(--surface);border:none;color:var(--muted);font-family:inherit;font-size:.72rem;
  font-weight:700;padding:5px 11px;cursor:pointer}
.vtoggle button[aria-pressed="true"]{background:var(--accent);color:#fff}
.vtoggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* table view */
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
table.ht{width:100%;border-collapse:collapse;font-size:.8rem;background:var(--surface);min-width:400px}
table.ht th{position:sticky;top:0;background:var(--surface2);font-size:.62rem;letter-spacing:.02em;color:var(--muted);
  font-weight:700;padding:7px 6px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;z-index:1}
table.ht th.l,table.ht td.l{text-align:left}
table.ht td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap;
  font-variant-numeric:tabular-nums}
table.ht tr:last-child td{border-bottom:none}
table.ht tr.win td{background:var(--good-soft)}
table.ht tr.scr td{opacity:.5}
table.ht .tnum{display:inline-flex;width:20px;height:20px;border-radius:5px;background:var(--ink);color:var(--bg);
  font-weight:800;font-size:.72rem;align-items:center;justify-content:center}
table.ht tr.win .tnum{background:var(--good)}
table.ht td.l{vertical-align:middle}
table.ht .c2{display:flex;flex-direction:column;line-height:1.18}
table.ht .c2r{align-items:flex-end}
table.ht .tname{font-weight:700;max-width:112px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.ht .tjk{color:var(--ink);font-weight:600;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.ht .tsub{font-size:.63rem;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400}
table.ht .tsub.num{font-variant-numeric:tabular-nums}
table.ht .abil{color:var(--accent);font-weight:800}
table.ht .win-c{font-weight:800}
table.ht .fin{font-size:.68rem;color:var(--muted)}
table.ht .fin.top{color:var(--good);font-weight:800}
/* 単勝ROI>1 ハイライト（スキャン連続でだんだん濃く） */
table.ht tr.ev1{background:color-mix(in srgb,var(--ev-hue) 13%,transparent)}
table.ht tr.ev2{background:color-mix(in srgb,var(--ev-hue) 26%,transparent)}
table.ht tr.ev3{background:color-mix(in srgb,var(--ev-hue) 42%,transparent)}
table.ht .roi{color:color-mix(in srgb,var(--ev-hue) 78%,var(--ink));font-weight:800}

/* horse cards */
.horse{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow)}
.horse.ev1{border-color:color-mix(in srgb,var(--ev-hue) 45%,var(--border));background:color-mix(in srgb,var(--ev-hue) 7%,var(--surface))}
.horse.ev2{border-color:color-mix(in srgb,var(--ev-hue) 68%,var(--border));background:color-mix(in srgb,var(--ev-hue) 13%,var(--surface))}
.horse.ev3{border-color:var(--ev-hue);background:color-mix(in srgb,var(--ev-hue) 20%,var(--surface));box-shadow:0 0 0 1px var(--ev-hue),var(--shadow)}
.horse.winner{border-color:var(--good);box-shadow:0 0 0 1px var(--good),var(--shadow)}
.horse.scratched{opacity:.5}
.hh{display:flex;align-items:center;gap:9px}
.rk{flex:none;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);
  font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.horse.winner .rk{background:var(--good);color:#fff;border-color:var(--good)}
.hnum{flex:none;width:26px;height:26px;border-radius:7px;background:var(--ink);color:var(--bg);
  font-weight:800;font-size:.86rem;display:flex;align-items:center;justify-content:center}
.hname{font-weight:700;font-size:.94rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hnamewrap{flex:1;min-width:0}
.hsub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hjk{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hjk::before{content:"騎 ";opacity:.6}
.hjk .jrec{color:var(--ink);font-weight:600}
.finish{flex:none;font-size:.66rem;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 6px;text-align:center;line-height:1.25}
.finish.top{color:var(--good);border-color:var(--good)}
.finish .rtime{display:block;font-size:.82em;font-weight:700;font-variant-numeric:tabular-nums;opacity:.85}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.m{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 4px;text-align:center}
.m .t{font-size:.6rem;color:var(--muted);letter-spacing:.01em}
.m .v{font-size:.98rem;font-weight:800;margin-top:1px}
.m .msub{font-size:.58rem;color:var(--muted);margin-top:1px;font-weight:600}
.feats{margin-top:9px;display:flex;flex-direction:column;gap:5px}
.ft{display:flex;align-items:center;gap:8px;font-size:.72rem}
.ft .fl{flex:none;width:52px;color:var(--muted);font-weight:700}
.ft .fbar{flex:1;height:7px;background:var(--border2);border-radius:99px;overflow:hidden}
.ft .fbar span{display:block;height:100%;border-radius:99px}
.ft .fv{flex:none;width:26px;text-align:right;font-weight:700}
.m.abil .v{color:var(--accent)}
.wbar{margin-top:9px;height:7px;background:var(--border2);border-radius:99px;overflow:hidden}
.wbar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent))}
.aptline{margin-top:8px;font-size:.7rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.aptline .roi{color:color-mix(in srgb,var(--ev-hue) 82%,var(--ink))}
.aptline b{color:var(--ink);font-weight:700}

/* aptitude */
canvas{width:100%;height:auto;display:block;touch-action:pan-y}
.legend{display:flex;gap:14px;justify-content:center;font-size:.68rem;color:var(--muted);margin-top:8px;flex-wrap:wrap}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
.apthint{font-size:.76rem;color:var(--muted);margin:10px 2px 8px;line-height:1.5}
.apthint b{color:var(--ink)}
.hmwrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);background:var(--surface)}
table.hm{border-collapse:collapse;width:100%;min-width:520px;font-size:.8rem}
table.hm th{font-size:.64rem;color:var(--muted);font-weight:700;padding:6px 5px;text-align:center;white-space:pre-line;border-bottom:1px solid var(--border)}
table.hm th.l,table.hm td.l{text-align:left}
table.hm td{padding:0;border-bottom:1px solid var(--border2);text-align:center}
table.hm td.l{padding:5px 7px}
.hcell{height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05;border-radius:6px;margin:2px}
.hcell .r{font-weight:800;font-variant-numeric:tabular-nums;font-size:.82rem}
.hcell .n{font-size:.56rem;opacity:.75}
.hcell.empty{color:var(--muted);background:repeating-linear-gradient(45deg,transparent,transparent 4px,var(--border2) 4px,var(--border2) 5px)}
.hmn{display:inline-flex;width:19px;height:19px;border-radius:5px;background:var(--ink);color:var(--bg);font-weight:800;font-size:.68rem;align-items:center;justify-content:center;margin-right:5px}
.hmnm{font-weight:700;font-size:.8rem}.hmwp{color:var(--muted);font-size:.68rem}
.slider-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:10px;box-shadow:var(--shadow);flex-wrap:wrap}
.slider-row input[type=range]{flex:1;min-width:150px;accent-color:var(--edge)}
.mval{font-weight:800;font-size:1.2rem;color:var(--edge);font-variant-numeric:tabular-nums;min-width:64px}
.mlab{font-size:.68rem;color:var(--muted)}
.rankrow{display:grid;grid-template-columns:120px 1fr 52px;gap:8px;align-items:center;padding:3px 0}
.rankrow .who{display:flex;align-items:center;gap:6px;min-width:0}
.rankrow .who .rn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.82rem;font-weight:600}
.rtrack{height:19px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;position:relative}
.rfill{height:100%;background:var(--good);border-radius:6px 0 0 6px}
.rankrow.dim{opacity:.5}
.rmeta{font-size:.68rem;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;line-height:1.15}
.wptick{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--accent)}
.cardapt{margin-top:10px;border-top:1px solid var(--border2);padding-top:8px}
.cardapt .lab{font-size:.68rem;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.cardapt .lab b{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.carddots{width:100%;height:auto;display:block}
.nodata{font-size:.7rem;color:var(--muted);margin-top:7px}
.colspanel{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 13px;margin:0 0 11px;box-shadow:var(--shadow)}
.colshint{font-size:.7rem;color:var(--muted);margin-bottom:8px;font-weight:700}
.colchk{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;margin:0;cursor:pointer}
.colchk input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer}
.collist{display:flex;flex-direction:column;gap:1px}
.colrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 2px;border-bottom:1px solid var(--border2)}
.colrow:last-child{border-bottom:none}
.colmove{display:flex;gap:5px;flex:none}
.mv{background:var(--surface2);border:1px solid var(--border);color:var(--ink);border-radius:6px;width:32px;height:30px;font-size:.82rem;cursor:pointer;font-family:inherit;line-height:1}
.mv:disabled{opacity:.28;cursor:default}
.fixed{font-size:.6rem;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:0 5px;margin-left:3px}
.colreset{margin-top:10px;background:none;border:none;color:var(--edge);font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}

.foot{font-size:.72rem;color:var(--muted);line-height:1.7;margin-top:26px;border-top:1px solid var(--border);padding-top:14px}
</style>

<header>
  <div class="brand"><span class="dot"></span>ばんえい予測レビュー<small id="gen"></small></div>
</header>

<div class="nav">
  <div class="nav-in">
    <div class="dates" id="dates"></div>
    <div class="races" id="races"></div>
  </div>
</div>

<div class="wrap">
  <div id="meta"></div>
  <div class="secthead">
    <span class="sect">出走馬 予測</span>
    <div class="vtoggle" id="stoggle">
      <button data-s="rank" aria-pressed="true">予測順</button>
      <button data-s="num" aria-pressed="false">馬番順</button>
    </div>
    <div class="vtoggle" id="vtoggle">
      <button data-v="table" aria-pressed="true">表</button>
      <button data-v="card" aria-pressed="false">カード</button>

<script id="data" type="application/json">/*__DATA__*/</script>
<script>
function boot(DB){
const RACES = DB.races;
const pct = v => v==null ? "—" : (v*100).toFixed(0)+"%";
const secFmt = s => s==null ? "—" : s.toFixed(1)+"s";
// 枠番→帽色（日本競馬の標準8枠色）
const CAP = {1:['#ffffff','#1a1a1a'],2:['#2b2b2b','#ffffff'],3:['#e23b32','#ffffff'],
  4:['#2f6fd0','#ffffff'],5:['#f3d000','#1a1a1a'],6:['#2f9e44','#ffffff'],
  7:['#ef8a1a','#ffffff'],8:['#ff8fb3','#1a1a1a']};
function capStyle(g){ const c=CAP[g]; return c?`background:${c[0]};color:${c[1]};border:1px solid rgba(0,0,0,.22)`:''; }
const cleanInst = s => (s||"").replace(/[（(][^）)]*[）)]/g,"").trim();  // 「（ばんえい）」等を除去
const evCls = h => h && h.ev_streak>0 ? "ev"+Math.min(h.ev_streak,3) : "";  // 単勝ROI>1 の連続回数→色の濃さ
const recFmt = r => (r && r.length===4) ? "("+r.join(",")+")" : "初騎乗";   // 当該馬×騎手の(1着,2着,3着,4着)
function sledFmt(h){
  if(h.sled_kg==null) return "—";
  const b = h.sled_kg.toFixed(0);
  if(h.sled_diff==null) return b;
  const d = h.sled_diff;
  const s = d>0 ? "+"+d : (d<0 ? ""+d : "±0");
  return b+"("+s+")";
}
const sledTop = h => h.sled_kg!=null ? h.sled_kg.toFixed(0) : "—";
function sledSub(h){
  if(h.sled_kg==null || h.sled_diff==null) return "";
  const d = h.sled_diff;
  return "(" + (d>0 ? "+"+d : (d<0 ? ""+d : "±0")) + ")";
}
document.getElementById("gen").textContent = "予測生成 "+DB.generated;

const dates = [...new Set(RACES.map(r=>r.date))].sort();
let curDate = dates[0], curRno = 1, view = "table", sortMode = "rank", dim = "time";
const target = { time: 115, moist: 1.7 };
const STAGE = { pre:"事前予測", moist:"水分反映", evscan:"オッズEV", odds:"買い目確定", result:"結果確定" };
let liveWS=null, cdTimer=null, liveState=null;

// build date pills
document.getElementById("dates").innerHTML = dates.map(d=>
  `<div class="dpill" data-d="${d}">${d.slice(5).replace('-','/')}</div>`).join("");
function racesFor(d){ return RACES.filter(r=>r.date===d).sort((a,b)=>a.race_no-b.race_no); }

function renderRacePills(){
  document.getElementById("races").innerHTML = racesFor(curDate).map(r=>{
    const hit = r.winner!=null && r.predicted_top===r.winner;
    return `<div class="rpill" data-r="${r.race_no}">${r.race_no}R${hit?'<span class="hitdot"></span>':''}</div>`;
  }).join("");
  document.querySelectorAll("#races .rpill").forEach(p=>p.addEventListener("click",()=>{
    curRno=+p.dataset.r; sync();
  }));
}
function get(){ return racesFor(curDate).find(r=>r.race_no===curRno) || racesFor(curDate)[0]; }

function sync(){
  document.querySelectorAll("#dates .dpill").forEach(p=>p.setAttribute("aria-pressed",p.dataset.d===curDate));
  document.querySelectorAll("#races .rpill").forEach(p=>p.setAttribute("aria-pressed",+p.dataset.r===curRno));
  render();
}
document.querySelectorAll("#dates .dpill").forEach(p=>p.addEventListener("click",()=>{
  curDate=p.dataset.d; curRno=racesFor(curDate)[0].race_no; renderRacePills(); sync();
}));

// レース短評（勝率分布から軸の堅さ・混戦度を判定。Eloの裏付けも併記）
function raceAssessment(r){
  const hs=[...r.horses].filter(h=>h.win_prob!=null&&h.win_prob>0).sort((a,b)=>b.win_prob-a.win_prob);
  if(hs.length<3) return null;
  const p1=hs[0].win_prob,p2=hs[1].win_prob,p3=hs[2].win_prob,p4=hs[3]?hs[3].win_prob:0;
  const g12=p1-p2,g23=p2-p3,g34=p3-p4, a=hs[0].num,b=hs[1].num,c=hs[2].num;
  const eloTop=[...hs].sort((x,y)=>(y.elo||0)-(x.elo||0))[0];
  const eloNote = eloTop.num===a ? "Eloも最上位で裏付けあり" : `Elo最上位は${eloTop.num}番`;
  let o;
  if(p1>=0.34 && g12>=0.14) o={label:"軸鉄板",note:`${a}番が明確に抜けている`,cls:"ax"};
  else if(p1>=0.26 && g12>=0.07) o={label:"軸有力",note:`${a}番が本命、相手を絞って`,cls:"ax"};
  else if(p1>=0.22 && p2>=0.18 && g23>=0.06) o={label:"2強",note:`${a}番・${b}番の一騎打ち`,cls:"two"};
  else if(p3>=0.15 && g34>=0.05) o={label:"3強",note:`${a}・${b}・${c}番の上位3頭`,cls:"two"};
  else if(p1<0.18) o={label:"大混戦",note:"抜けた馬なし・波乱含み",cls:"chaos"};
  else o={label:"混戦",note:"有力数頭で拮抗",cls:"mix"};
  o.eloNote=eloNote;
  return o;
}
function render(){
  const r = get(); if(!r) return;
  // meta
  const hasResult = r.horses.some(h=>h.position!=null);
  const hit = r.winner!=null && r.predicted_top===r.winner;
  const favHit = r.winner!=null && r.market_fav===r.winner;
  const moistChip = r.moisture!=null
    ? `<span class="chip moist">馬場水分 ${r.moisture}%</span>`
    : `<span class="chip pre">馬場水分 未定</span>`;
  const preBadge = hasResult ? "" : `<span class="chip pre">発走前・暫定</span>`;
  const updChip = r.updated_at
    ? `<span class="chip upd">🕛 ${(STAGE[r.update_stage]||'更新')} ${String(r.updated_at).slice(5,16).replace('-','/')}</span>` : "";
  const asm = raceAssessment(r);
  const asHtml = asm ? `<div class="assess ${asm.cls}"><span class="al">${asm.label}</span><span class="an">${asm.note}<span class="an2">・${asm.eloNote}</span></span></div>` : "";
  let resultRow;
  if(hasResult){
    resultRow =
      `<div class="rescell"><div class="t">予測1位</div><div class="v num">${r.predicted_top??'—'}</div>`
      +`<div class="hitmark ${hit?'o':'x'}">${hit?'的中○':'不的中'}</div></div>`
      +`<div class="rescell"><div class="t">市場1番人気</div><div class="v num">${r.market_fav??'—'}</div>`
      +`<div class="hitmark ${favHit?'o':'x'}">${favHit?'的中○':'—'}</div></div>`
      +`<div class="rescell win"><div class="t">結果1着</div><div class="v num">${r.winner??'—'}</div>`
      +`<div class="hitmark o">確定</div></div>`;
  } else {
    resultRow =
      `<div class="rescell"><div class="t">予測1位</div><div class="v num">${r.predicted_top??'—'}</div>`
      +`<div class="hitmark x">本命</div></div>`
      +`<div class="rescell"><div class="t">市場1番人気</div><div class="v num">${r.market_fav??'—'}</div>`
      +`<div class="hitmark x">${r.market_fav?'':'オッズ未定'}</div></div>`
      +`<div class="rescell"><div class="t">結果1着</div><div class="v num">—</div>`
      +`<div class="hitmark x">発走前</div></div>`;
  }
  document.getElementById("meta").innerHTML =
    `<div class="meta"><div class="top"><span class="rname">${r.race_no}R ${r.race_name||''}</span></div>`
    +`<div class="chips"><span class="chip">クラス <b>${r.class||'—'}</b></span>`
    +moistChip
    +`<span class="chip">${r.field_size}頭</span>`
    +(r.post_time?`<span class="chip">発走 <b>${r.post_time}</b></span>`:'')
    +(hasResult?`<span class="chip">決着 <b>${r.win_time||'—'}</b></span>`:'')
    +preBadge+updChip+`</div>`
    +asHtml
    +`<div class="result">`+resultRow+`</div></div>`;

  // horses
  const maxW = Math.max(...r.horses.map(h=>h.win_prob||0), .0001);
  const hs = [...r.horses].sort(sortMode==="num"
    ? (a,b)=>a.num-b.num
    : (a,b)=>(a.rank||99)-(b.rank||99));
  const host = document.getElementById("horses");
  if(view==="table") host.innerHTML = tableView(hs, hasResult);
  else if(view==="card"){ host.innerHTML = cardView(hs, maxW, hasResult);
    hs.forEach(h=>drawCardDots(document.getElementById("cd_"+h.num), h)); }
  else { host.innerHTML = betsView(r); wireBetSettings(r); }

  if(view!=="bets") stopLive();
  renderAptitude(r);
}

// ---- 買い目ビュー（バックエンド未設定=静的 / 設定済=WSライブ） ----
function backendCfg(){
  return { url:(localStorage.getItem("voting_backend")||"").replace(/\/+$/,""),
           token:localStorage.getItem("voting_token")||"" };
}
// PCの run_all.ps1 が publish する backend.json からトンネルURLを自動取得（手入力不要に）。
async function loadBackendConfig(){
  try{
    const r = await fetch("./backend.json?cb="+Date.now(), {cache:"no-store"});
    if(!r.ok) return;
    const j = await r.json();
    if(j && j.url && localStorage.getItem("voting_backend")!==j.url){
      localStorage.setItem("voting_backend", j.url);
      if(view==="bets"){ stopLive(); render(); }
    }
  }catch(e){}
}
function fmtCountdown(s){
  if(s==null) return "—";
  if(s<=0) return "締切";
  const h=Math.floor(s/3600), m=Math.floor(s%3600/60), sec=Math.floor(s%60);
  return (h>0? h+":":"")+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}
function betsTable(bets){
  const total = bets.reduce((s,b)=>s+(b.stake||0),0);
  const rows = bets.map(b=>`<tr><td class="l"><span class="bt">${b.bet_type_jp}</span></td>`
    +`<td class="l combo">${b.combo}</td><td class="num">${b.odds!=null?b.odds.toFixed(1):'—'}</td>`
    +`<td class="num evp">${(b.ev!=null?b.ev:0).toFixed(2)}</td><td class="num">${pct(b.prob)}</td>`
    +`<td class="num">¥${(b.stake||0).toLocaleString()}</td></tr>`).join("");
  return {total, html:`<div class="betwrap"><table class="bt-tbl"><thead><tr><th class="l">券種</th><th class="l">買い目</th>`
    +`<th>オッズ</th><th>EV</th><th>確率</th><th>賭金</th></tr></thead><tbody>${rows}</tbody></table></div>`};
}
function settingsHtml(){
  const cfg=backendCfg();
  return `<div class="betset"><button class="setbtn" id="setToggle">⚙ 投票バックエンド設定${cfg.url?' ✓':''}</button>`
    +`<div class="setfields" id="setFields" style="display:none">`
    +`<label>Backend URL (https) ※run_all.ps1起動で自動設定<input id="beUrl" value="${cfg.url}" placeholder="自動取得されます"></label>`
    +`<label>Token（最初の一度だけ入力）<input id="beToken" value="${cfg.token}" placeholder="run_all.ps1 が表示するトークン"></label>`
    +`<button class="savebtn" id="beSave">保存して接続</button></div></div>`;
}
function staticBetsBody(r){
  const stage = STAGE[r.update_stage]||'—';
  const tm = r.updated_at ? String(r.updated_at).slice(11) : "";
  if(!("bets" in r) || r.bets==null){
    return `<div class="explain">買い目は<b>発走7分前</b>にオッズから算出されます。現在の段階: <b>${stage}</b>${tm?`（${tm}）`:''}。`
      +`ライブ投票するにはPCで <code>run_voting.ps1</code> と <code>run_tunnel.ps1</code> を起動し、上の設定にURL+トークンを入力してください。</div>`;
  }
  const bets=r.bets||[];
  if(!bets.length) return `<div class="explain">${tm} 時点で<b>EV≧1.25（市場ブレンド＋ヘアカット後）の妙味なし＝<b>見送り</b></b>。</div>`;
  const t=betsTable(bets);
  return t.html+`<div class="cart-row"><button class="cart-btn" id="cartbtn">🛒 楽天競馬で投票（買い目コピー）</button>`
    +`<span class="cart-total">合計 ¥${t.total.toLocaleString()}</span></div>`
    +`<div class="explain">${tm} 時点の目安。ライブ投票はPCバックエンド接続時に有効になります。</div>`;
}
function betsView(r){
  const cfg=backendCfg();
  if(cfg.url) return settingsHtml()+`<div id="betslive"><div class="explain">ライブ買い目に接続中…（${cfg.url}）</div></div>`;
  return settingsHtml()+staticBetsBody(r);
}
function wireBetSettings(r){
  const t=document.getElementById("setToggle");
  if(t) t.addEventListener("click",()=>{ const f=document.getElementById("setFields"); if(f) f.style.display=f.style.display==="none"?"grid":"none"; });
  const s=document.getElementById("beSave");
  if(s) s.addEventListener("click",()=>{
    localStorage.setItem("voting_backend",(document.getElementById("beUrl").value||"").trim());
    localStorage.setItem("voting_token",(document.getElementById("beToken").value||"").trim());
    stopLive(); render();
  });
  if(backendCfg().url) startLive(r);
  else { const cb=document.getElementById("cartbtn"); if(cb) cb.addEventListener("click",()=>onAddToCart(r)); }
}
function renderLive(){
  const box=document.getElementById("betslive"); if(!box) return;
  const st=liveState;
  if(!st){ box.innerHTML=`<div class="explain">接続待ち…</div>`; return; }
  const cd=fmtCountdown(st._cdNow!=null?st._cdNow:st.countdown_sec);
  const head=`<div class="livehead"><span class="cd">締切まで <b>${cd}</b></span>`
    +`<span class="livetm">🕛 ライブ ${st.updated_at?String(st.updated_at).slice(11):''}</span></div>`;
  const bets=st.bets||[];
  if(!bets.length){ box.innerHTML=head+`<div class="explain">現時点で<b>EV≧1.25の妙味なし＝見送り</b>（オッズ変動で変わる場合あり）。</div>`; return; }
  const t=betsTable(bets);
  box.innerHTML=head+t.html
    +`<div class="cart-row"><button class="cart-btn" id="cartbtn">🛒 馬券をカゴに追加（楽天競馬）</button>`
    +`<span class="cart-total">合計 ¥${t.total.toLocaleString()}</span></div>`
    +`<div class="explain">ライブ最新オッズで算出。カゴ投入後、<b>最終確定はご自身で</b>行ってください。</div>`;
  const cb=document.getElementById("cartbtn"); if(cb) cb.addEventListener("click",()=>postVote(bets));
}
function startLive(r){
  const cfg=backendCfg(); if(!cfg.url) return;
  const wsUrl=cfg.url.replace(/^http/,"ws")+"/ws?token="+encodeURIComponent(cfg.token);
  if(!liveWS || liveWS._url!==wsUrl || liveWS.readyState>1){
    stopLive();
    try{ liveWS=new WebSocket(wsUrl); }catch(e){ return; }
    liveWS._url=wsUrl;
    liveWS.onopen=()=>{ liveWS._ready=true; sendSub(r); };
    liveWS.onmessage=(ev)=>{ let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
      if(m.type==="race"){ liveState=m.race; liveState._cdNow=m.countdown_sec; renderLive(); }
      else if(m.type==="error"){ const b=document.getElementById("betslive"); if(b) b.innerHTML=`<div class="explain">バックエンドエラー: ${m.message}</div>`; } };
  } else if(liveWS._ready){ sendSub(r); }
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{ if(liveState&&liveState._cdNow!=null){ liveState._cdNow=Math.max(0,liveState._cdNow-1);
    const el=document.querySelector("#betslive .cd b"); if(el) el.textContent=fmtCountdown(liveState._cdNow); } },1000);
}
function sendSub(r){ liveState=null; try{ liveWS.send(JSON.stringify({type:"subscribe",date:r.date,rno:r.race_no})); }catch(e){} }
function stopLive(){ clearInterval(cdTimer); cdTimer=null; if(liveWS){ try{ liveWS.close(); }catch(e){} liveWS=null; } liveState=null; }
function postVote(bets){
  const cfg=backendCfg(); const r=get();
  if(!confirm("楽天競馬のカゴに以下を投入します（最終確定は楽天画面でご自身で）。\n\n合計 ¥"+bets.reduce((s,b)=>s+(b.stake||0),0).toLocaleString()+" / "+bets.length+"点\n\nよろしいですか？")) return;
  fetch(cfg.url+"/vote?token="+encodeURIComponent(cfg.token),{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({bets:bets, date:r.date, rno:r.race_no})})
    .then(res=>res.json()).then(j=>alert("バックエンド応答:\n"+JSON.stringify(j,null,1)))
    .catch(e=>alert("送信エラー: "+e+"\nバックエンド(PC)とトンネルが起動しているか確認してください。"));
}
function onAddToCart(r){
  const bets = r.bets||[];
  if(!bets.length){ alert("追加できる買い目がありません。"); return; }
  const lines = bets.map(b=>`${b.bet_type_jp} ${b.combo}  ¥${(b.stake||0).toLocaleString()}`).join("\n");
  try{ navigator.clipboard && navigator.clipboard.writeText(lines); }catch(e){}
  window.open("https://keiba.rakuten.co.jp/", "_blank", "noopener");
  alert("買い目をコピーし、楽天競馬を開きました。\n\n"+lines+"\n\n※投票画面で入力してください（PCバックエンド接続時はワンタップでカゴ投入できます）。");
}

// 予想材料スコア（0-10, 5=そのレース平均）の色・表示
function featColor(v){ if(v==null) return "var(--muted)"; if(v>=6.5) return "var(--good)"; if(v<=4.0) return "var(--accent)"; return "var(--ink)"; }
function featSpan(v){ return `<span style="color:${featColor(v)};font-weight:800">${v!=null?v.toFixed(1):'—'}</span>`; }
function featBar(label,v){ const w=Math.max(0,Math.min(100,(v||0)*10));
  return `<div class="ft"><span class="fl">${label}</span><span class="fbar"><span style="width:${w}%;background:${featColor(v)}"></span></span><span class="fv num">${v!=null?v.toFixed(1):'—'}</span></div>`; }
// テーブルの列定義（always=常時表示。それ以外は「⚙列」で表示/非表示できる）
const COLS = [
  {key:"num", label:"馬番", always:true, th:'<th class="l">馬</th>',
   td:h=>`<td class="l"><span class="tnum" style="${capStyle(h.gate)}">${h.num}</span></td>`},
  {key:"name", label:"馬名・馬齢・厩舎", always:true, th:'<th class="l">馬名 / 馬齢・厩舎</th>',
   td:h=>`<td class="l"><div class="c2"><span class="tname">${h.name||''}</span><span class="tsub">${(h.sex||'')+(h.age!=null?h.age:'')}${h.trainer?'・'+cleanInst(h.trainer):''}</span></div></td>`},
  {key:"jockey", label:"騎手・成績", th:'<th class="l">騎手 / 成績</th>',
   td:h=>`<td class="l"><div class="c2"><span class="tjk">${h.jockey||'—'}</span><span class="tsub num">${recFmt(h.jockey_record)}</span></div></td>`},
  {key:"sled", label:"斤量", th:'<th>斤量</th>',
   td:h=>`<td class="num"><div class="c2 c2r"><span>${sledTop(h)}</span><span class="tsub num">${sledSub(h)}</span></div></td>`},
  {key:"abil", label:"能力/Elo", th:'<th>能力/Elo</th>',
   td:h=>`<td class="num"><div class="c2 c2r"><span class="abil">${h.ability!=null?h.ability.toFixed(1):'—'}</span><span class="tsub num">${h.elo!=null?h.elo:'—'}</span></div></td>`},
  {key:"obstacle", label:"障害力", th:'<th>障害</th>', td:h=>`<td class="num">${featSpan(h.f_obstacle)}</td>`},
  {key:"finish", label:"終い指数", th:'<th>終い</th>', td:h=>`<td class="num">${featSpan(h.f_finish)}</td>`},
  {key:"weight", label:"重量適性", th:'<th>重量</th>', td:h=>`<td class="num">${featSpan(h.f_weight)}</td>`},
  {key:"win", label:"勝率", always:true, th:'<th>勝率</th>', td:h=>`<td class="win-c num">${pct(h.win_prob)}</td>`},
  {key:"place2", label:"連対率", th:'<th>連対</th>', td:h=>`<td class="num">${pct(h.place2)}</td>`},
  {key:"place3", label:"複勝率", th:'<th>複勝</th>', td:h=>`<td class="num">${pct(h.place3)}</td>`},
  {key:"odds", label:"オッズ・単勝EV", th:'<th>オッズ / EV</th>',
   td:h=>`<td class="num"><div class="c2 c2r"><span>${h.odds!=null?h.odds.toFixed(1):'—'}</span><span class="tsub num ${h.ev_buy?'roi':''}">${h.ev!=null?'×'+h.ev.toFixed(2):'—'}</span></div></td>`},
  {key:"pop", label:"人気", th:'<th>人気</th>', td:h=>`<td class="num">${h.popularity?h.popularity:'—'}</td>`},
  {key:"fin", label:"着順・決着タイム", th:'<th>着 / 決着</th>',
   td:(h,hasResult)=>{ const top=h.position!=null&&h.position<=3; const fin=!hasResult?"—":(h.position!=null?`${h.position}着`:"除外"); const rt=hasResult&&h.result_time?h.result_time:"—"; return `<td class="fin ${top?'top':''}"><div class="c2 c2r"><span>${fin}</span><span class="tsub num">${rt}</span></div></td>`; }},
];
function colHidden(){ try{ return new Set(JSON.parse(localStorage.getItem("cols_hidden")||"[]")); }catch(e){ return new Set(); } }
const DEFAULT_ORDER = COLS.map(c=>c.key);
function colOrder(){
  let ord; try{ ord=JSON.parse(localStorage.getItem("cols_order")||"null"); }catch(e){ ord=null; }
  if(!Array.isArray(ord)) ord=DEFAULT_ORDER.slice();
  ord=ord.filter(k=>COLS.some(c=>c.key===k));
  DEFAULT_ORDER.forEach(k=>{ if(!ord.includes(k)) ord.push(k); });
  return ord;
}
function orderedCols(){ const m=Object.fromEntries(COLS.map(c=>[c.key,c])); return colOrder().map(k=>m[k]); }
function tableView(hs, hasResult){
  const hidden=colHidden();
  const cols=orderedCols().filter(c=>c.always||!hidden.has(c.key));
  const rows=hs.map(h=>{
    const scr=hasResult && h.odds==null && h.position==null;
    const isWin=h.position===1;
    return `<tr class="${isWin?'win':''} ${scr?'scr':''} ${evCls(h)}">`+cols.map(c=>c.td(h,hasResult)).join("")+`</tr>`;
  }).join("");
  return `<div class="tblwrap"><table class="ht"><thead><tr>${cols.map(c=>c.th).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderColsPanel(){
  const p=document.getElementById("colsPanel"); if(!p) return;
  const hidden=colHidden();
  const ord=orderedCols();
  p.innerHTML = `<div class="colshint">表示する列と順序（チェック=表示、▲▼で並び替え。この端末に保存・表ビューに適用）</div>`
    + `<div class="collist">` + ord.map((c,i)=>
        `<div class="colrow">`
        +`<label class="colchk"><input type="checkbox" data-col="${c.key}" ${c.always?'checked disabled':(hidden.has(c.key)?'':'checked')}>${c.label}${c.always?' <span class="fixed">固定</span>':''}</label>`
        +`<span class="colmove"><button class="mv" data-col="${c.key}" data-dir="-1" ${i===0?'disabled':''}>▲</button>`
        +`<button class="mv" data-col="${c.key}" data-dir="1" ${i===ord.length-1?'disabled':''}>▼</button></span></div>`).join("")
    + `</div><button class="colreset" id="colReset">既定の列・順序に戻す</button>`;
  p.querySelectorAll("input[data-col]:not([disabled])").forEach(cb=>cb.addEventListener("change",()=>{
    const h=colHidden(); if(cb.checked) h.delete(cb.dataset.col); else h.add(cb.dataset.col);
    localStorage.setItem("cols_hidden", JSON.stringify([...h])); render();
  }));
  p.querySelectorAll(".mv").forEach(btn=>btn.addEventListener("click",()=>{
    const o=colOrder(), k=btn.dataset.col, i=o.indexOf(k), j=i+parseInt(btn.dataset.dir);
    if(j<0||j>=o.length) return;
    o.splice(i,1); o.splice(j,0,k);
    localStorage.setItem("cols_order", JSON.stringify(o));
    render(); renderColsPanel();
  }));
  const rb=document.getElementById("colReset");
  if(rb) rb.addEventListener("click",()=>{ localStorage.removeItem("cols_order"); localStorage.removeItem("cols_hidden"); render(); renderColsPanel(); });
}

// ---- 馬場適性（① ヒートマップ / ② スライダー / ③ カード内ドット） ----
function cssvar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
const DIMS = {
  time: {
    key:"wt", label:"決着タイム", unit:"s",
    bands:[{lo:-1,hi:100,label:"超速\n<100"},{lo:100,hi:115,label:"速\n100–115"},
           {lo:115,hi:130,label:"標準\n115–130"},{lo:130,hi:145,label:"遅\n130–145"},{lo:145,hi:9999,label:"超遅\n≥145"}],
    slMin:90, slMax:160, slStep:1, slWin:8, slFmt:v=>v.toFixed(0)+"s",
    what:"そのレースの<b>勝ちタイム</b>（馬場の速さ・条件。着順とは独立）", windo:"速い決着／重い決着",
  },
  moist: {
    key:"m", label:"馬場水分", unit:"%",
    bands:[{lo:-1,hi:1.0,label:"乾\n<1.0"},{lo:1.0,hi:1.7,label:"やや乾\n1.0–1.7"},
           {lo:1.7,hi:2.3,label:"標準\n1.7–2.3"},{lo:2.3,hi:3.0,label:"湿\n2.3–3.0"},{lo:3.0,hi:99,label:"多湿\n≥3.0"}],
    slMin:0.5, slMax:4.0, slStep:0.1, slWin:0.5, slFmt:v=>v.toFixed(1)+"%",
    what:"その走の<b>馬場水分</b>", windo:"湿ったら／乾いたら",
  },
};
function rateColor(rate,n){
  if(rate==null) return "transparent";
  const dark = matchMedia("(prefers-color-scheme:dark)").matches || document.documentElement.dataset.theme==="dark";
  const base1 = dark?[30,42,34]:[236,244,238], c2=[26,120,72];
  const rgb = base1.map((a,i)=>Math.round(a+(c2[i]-a)*rate));
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${0.4+0.6*Math.min(n,6)/6})`;
}
const textOn = rate => rate!=null && rate>0.55 ? "#fff" : "var(--ink)";
function bandStats(past,cfg,b){
  const rs = past.filter(x=>{ const v=x[cfg.key]; return v!=null && v>b.lo && v<=b.hi; });
  const n=rs.length, p3=rs.filter(x=>x.p<=3).length;
  return {n, rate: n? p3/n : null};
}
function renderAptitude(r){
  document.querySelectorAll("#dimseg button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.d===dim));
  renderHeatmap(r); renderSlider(r);
}
function renderHeatmap(r){
  const cfg = DIMS[dim];
  const hs = [...r.horses].sort((a,b)=>(b.win_prob||0)-(a.win_prob||0));
  const th = `<th class="l">馬（予測順）</th>`+cfg.bands.map(b=>`<th>${b.label}</th>`).join("");
  const rows = hs.map(h=>{
    const cells = cfg.bands.map(b=>{
      const s = bandStats(h.past||[],cfg,b);
      if(!s.n) return `<td><div class="hcell empty">—</div></td>`;
      return `<td><div class="hcell" style="background:${rateColor(s.rate,s.n)};color:${textOn(s.rate)}">`
        +`<span class="r">${pct(s.rate)}</span><span class="n">${s.n}走</span></div></td>`;
    }).join("");
    return `<tr><td class="l"><span class="hmn" style="${capStyle(h.gate)}">${h.num}</span><span class="hmnm">${h.name}</span> `
      +`<span class="hmwp">予測${pct(h.win_prob)}</span></td>${cells}</tr>`;
  }).join("");
  document.getElementById("heatlead").innerHTML =
    `① 帯別ヒートマップ ― 列＝${cfg.what}の帯。セル＝その帯で<b>複勝圏(3着内)に入った割合</b>（濃い緑ほど得意）＋走数。斜線＝未経験。`;
  document.getElementById("heatmap").innerHTML =
    `<div class="hmwrap"><table class="hm"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table></div>`
    +`<div class="legend"><span>複勝率:</span><span><span class="sw" style="background:${rateColor(0.15,6)}"></span>低</span>`
    +`<span><span class="sw" style="background:${rateColor(0.5,6)}"></span>中</span>`
    +`<span><span class="sw" style="background:${rateColor(0.85,6)}"></span>高</span></div>`;
}
function renderSlider(r){
  const cfg = DIMS[dim], t = target[dim], W = cfg.slWin, lo=t-W, hi=t+W;
  const rows = r.horses.map(h=>{
    const rs = (h.past||[]).filter(x=>{ const v=x[cfg.key]; return v!=null && v>=lo && v<=hi; });
    const n=rs.length, p3=rs.filter(x=>x.p<=3).length;
    return {h,n,rate:n?p3/n:null};
  });
  rows.sort((a,b)=>(b.rate??-1)-(a.rate??-1)||b.n-a.n);
  const body = rows.map(o=>{
    const w = o.rate!=null?Math.round(o.rate*100):0;
    const tick = o.h.win_prob!=null?`<span class="wptick" style="left:${Math.min(99,Math.round(o.h.win_prob*100))}%"></span>`:"";
    return `<div class="rankrow${o.rate==null?' dim':''}"><div class="who"><span class="hmn" style="${capStyle(o.h.gate)}">${o.h.num}</span><span class="rn">${o.h.name}</span></div>`
      +`<div class="rtrack"><span class="rfill" style="width:${w}%"></span>${tick}</div>`
      +`<div class="rmeta">${o.rate!=null?pct(o.rate):'該当なし'}<br>${o.n}走</div></div>`;
  }).join("");
  document.getElementById("slidlead").innerHTML =
    `② 想定条件スライダー ― <b>${cfg.label}</b>を動かすと各馬をその帯(±${W}${cfg.unit})の複勝率で並べ替え（発走前に「${cfg.windo}誰が有利か」を試す）。赤線＝今走モデル予測勝率。`;
  document.getElementById("slider").innerHTML =
    `<div class="slider-row"><div><div class="mval num" id="mval">${cfg.slFmt(t)}</div><div class="mlab">想定${cfg.label}</div></div>`
    +`<input type="range" min="${cfg.slMin}" max="${cfg.slMax}" step="${cfg.slStep}" value="${t}" id="mslider"></div><div>${body}</div>`;
  const sl = document.getElementById("mslider");
  sl.addEventListener("input", ()=>{ target[dim]=parseFloat(sl.value);
    document.getElementById("mval").textContent=cfg.slFmt(target[dim]);
    const y=window.scrollY; renderSlider(get()); window.scrollTo(0,y);
  });
}
function drawCardDots(cv, h){
  if(!cv) return;
  const past = (h.past||[]).filter(p=>p.t!=null && p.p!=null);
  const W = cv.clientWidth||300, H = Math.round(W*0.42), dpr=devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr; const c=cv.getContext("2d"); c.scale(dpr,dpr); c.clearRect(0,0,W,H);
  const padL=26,padR=8,padT=8,padB=15;
  const good=cssvar("--good"),muted=cssvar("--muted"),grid=cssvar("--border2"),accent=cssvar("--accent");
  if(!past.length){ c.fillStyle=muted;c.font="11px system-ui";c.textAlign="center";c.textBaseline="middle";
    c.fillText("過去走データなし",W/2,H/2); return; }
  const ts = past.map(p=>p.t).concat(h.place3_time_avg!=null?[h.place3_time_avg]:[]);
  let xmin=Math.min(...ts), xmax=Math.max(...ts);
  if(xmax-xmin<8){xmin-=8;xmax+=8;} else {const pd=(xmax-xmin)*0.1;xmin-=pd;xmax+=pd;}
  const fs=Math.max(h.field_size||10, ...past.map(p=>p.p), 8);
  const X=v=>padL+(v-xmin)/(xmax-xmin)*(W-padL-padR);
  const Y=p=>padT+(p-1)/(fs-1)*(H-padT-padB);
  c.strokeStyle=grid;c.lineWidth=1;c.fillStyle=muted;c.font="8px system-ui";c.textBaseline="middle";
  [1,3].forEach(p=>{const y=Y(p);c.beginPath();c.moveTo(padL,y);c.lineTo(W-padR,y);c.stroke();
    c.textAlign="right";c.fillText(p+"着",padL-3,y);});
  if(h.place3_time_avg!=null){ const x=X(h.place3_time_avg);
    c.strokeStyle=accent;c.lineWidth=1.5;c.setLineDash([4,3]);c.beginPath();c.moveTo(x,padT+2);c.lineTo(x,H-padB);c.stroke();c.setLineDash([]);
    c.fillStyle=accent;c.font="bold 9px system-ui";c.textAlign="center";c.textBaseline="bottom";c.fillText(h.place3_time_avg.toFixed(0)+"s",x,padT+2); }
  c.fillStyle=muted;c.font="8px system-ui";c.textBaseline="top";
  c.textAlign="left";c.fillText("速い←",padL,H-padB+3); c.textAlign="right";c.fillText("→遅い",W-padR,H-padB+3);
  past.forEach(p=>{ const x=X(p.t),y=Y(Math.min(p.p,fs));
    c.beginPath();c.arc(x,y,2.6,0,7);c.fillStyle=p.p<=3?good:muted;c.globalAlpha=p.p<=3?0.9:0.35;c.fill();c.globalAlpha=1; });
}

  +"Plackett-Luce（順位確率）モデルによる推定。<b>予測は当日の馬場水分に応じて動的に変わります</b>。"
  +"下部の馬場適性は各馬の過去走（レース日以前のみ＝リーク防止）から集計。「決着タイム」はそのレースの勝ちタイムで、馬場の速さ・条件を表す（着順と独立）。"

  +"斤量は今走のソリ重量で、括弧内は前回からの増減。"
